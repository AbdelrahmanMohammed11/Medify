services:
  pgvector:
    image: pgvector/pgvector:0.8.0-pg17

    container_name: pgvector
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    networks:
      - backend
    restart: always


networks:
  backend:

volumes:
  pgvector_data: